name: Update GTFS
on:
  schedule:
    - cron: '0 6 * * *' # varje dag kl 08:00 svensk tid
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ladda ner statisk-zip
        run: |
          curl -H "Accept-Encoding: gzip" -o dt.zip "https://opendata.samtrafiken.se/gtfs/dt/dt.zip?key=${{ secrets.GTFS_KEY }}"
          unzip -o dt.zip
          rm dt.zip
      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trips.txt routes.txt
          git diff --staged --quiet || git commit -m "Update GTFS data $(date +%Y-%m-%d)"
          git push
